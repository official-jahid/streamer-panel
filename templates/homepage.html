{% extends 'base.html' %} {% block body %}
<script src="{{url_for('static',filename='js/homepage.js')}}"></script>
<div class="h-screen flex items-center justify-center relative overflow-hidden">
  <div class="absolute inset-0 bg-black opacity-50"></div>
  <div class="flex flex-col items-center container z-10">
    <div class="flex flex-col justify-center items-center mb-8">
      <img
        class="w-48 h-48 outline outline-red-600 rounded-full glow-effect"
        src="{{url_for('static',filename='images/logo.png')}}"
        alt="REGIX Studio"
        sizes=""
        srcset="" />
      <span class="text-4xl text-center font-bold text-red-500 neon-blood mt-4">REGIX Studio</span>
      <span class="text-red-400 opacity-80 mt-2">Advanced Gaming Solutions</span>
    </div>
    <div class="w-full px-4 md:w-1/2 lg:w-1/3">
      <div class="mb-4">
        <label
          for="username"
          class="block text-base font-medium text-red-200 mb-2">
          Username
        </label>
        <input
          id="username"
          type="text"
          placeholder="Enter your username..."
          class="w-full bg-black bg-opacity-50 rounded-md border border-red-800 text-white outline-none transition focus:border-red-500 focus:shadow-lg focus:shadow-red-500/50 py-3 px-5 hover-blood-glow" />
      </div>
    </div>
    <div class="w-full px-4 md:w-1/2 lg:w-1/3">
      <div class="mb-4">
        <label
          for="password"
          class="block text-base font-medium text-red-200 mb-2">
          Password
        </label>
        <input
          id="password"
          type="password"
          placeholder="Enter your password..."
          class="w-full bg-black bg-opacity-50 rounded-md border border-red-800 text-white outline-none transition focus:border-red-500 focus:shadow-lg focus:shadow-red-500/50 py-3 px-5 hover-blood-glow" />
      </div>
    </div>
    <button
      onclick="auth()"
      class="button-blood text-white border-red-700 border rounded-full inline-flex items-center justify-center py-3 px-8 font-medium hover:scale-105 transform transition-all duration-300">
      Login to REGIX Studio
    </button>
    <span
      class="text-red-500 text-xl mt-4 pulse-blood"
      id="status"></span>
  </div>
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-0 left-1/4 w-1 h-full bg-red-800 opacity-20" style="animation: blood-drip 8s infinite;"></div>
    <div class="absolute top-0 left-2/4 w-1 h-full bg-red-600 opacity-20" style="animation: blood-drip 12s infinite 2s;"></div>
    <div class="absolute top-0 left-3/4 w-1 h-full bg-red-400 opacity-20" style="animation: blood-drip 10s infinite 1s;"></div>
  </div>
</div>

{% endblock %}
